# Publish @robotico-dev/specification to GitHub Packages (npm).
# Trigger: create a Release (published) or run workflow_dispatch.
# Scope @robotico-dev must match the GitHub org/user that owns this repo for GITHUB_TOKEN to work.
name: Build and Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: https://npm.pkg.github.com
          scope: "@robotico-dev"
          cache: "npm"

      - run: npm ci
      - run: npm run build
      - run: npm run test
      # Fails the job if coverage thresholds (90%) are not met; do not use || true
      - name: Check coverage thresholds (90%)
        run: npm run test:coverage
      - run: npm run lint
      - run: npm run docs

  publish:
    needs: [build-and-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
      id-token: write   # required for npm publish --provenance (attestation)
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@robotico-dev"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - name: Derive version from tag or package.json
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          fi

      - name: Publish to GitHub Packages
        run: npm publish --provenance
